# Docker Compose for VoxCPM, deployed as a single Gradio service.
#
# All tunable parameters come from .env and have built-in defaults here, so this
# file needs no manual editing. Copy .env.example to .env to customize; the most
# important value is VOXCPM_ASSET_ROOT (host directory for large assets).
#
# Large model files, caches, datasets, generated outputs, and Gradio temp files
# can consume many GBs. They are bind-mounted under VOXCPM_ASSET_ROOT so they do
# not grow the Docker image, Docker volumes, WSL virtual disk, or the system
# drive. Set VOXCPM_ASSET_ROOT to a storage drive with enough free space, e.g.
# E:/DockerRes/VoxCPM. The default "." keeps assets in the project directory.

services:
  voxcpm:
    build:
      context: .
      dockerfile: Dockerfile
    image: voxcpm:local
    container_name: voxcpm
    restart: unless-stopped

    # Host port -> container port. The app inside the container listens on 8808.
    ports:
      - "${VOXCPM_HOST_PORT:-5106}:8808"

    environment:
      # Use /models/VoxCPM2 for the model downloaded inside the container at
      # startup (default), or set VOXCPM_MODEL_ID=openbmb/VoxCPM2 in .env to let
      # the app resolve/download it from Hugging Face at load time instead.
      VOXCPM_MODEL_ID: ${VOXCPM_MODEL_ID:-/models/VoxCPM2}
      VOXCPM_DEVICE: ${VOXCPM_DEVICE:-auto}
      VOXCPM_PORT: "8808"

      # Hugging Face token (from .env) for authenticated / accelerated downloads
      # performed inside the container. Optional; empty means anonymous access.
      HF_TOKEN: ${HF_Token:-}

      # Container timezone for log timestamps and scheduling.
      TZ: ${TZ:-Asia/Shanghai}

      # Container-internal cache/temp locations. These map to the bind mounts
      # below and are fixed by container convention, not meant for .env tuning.
      HF_HOME: /cache/huggingface
      HUGGINGFACE_HUB_CACHE: /cache/huggingface/hub
      TRANSFORMERS_CACHE: /cache/huggingface/transformers
      HF_XET_HIGH_PERFORMANCE: "1"
      TORCH_HOME: /cache/torch
      GRADIO_TEMP_DIR: /tmp/gradio
      TOKENIZERS_PARALLELISM: "false"

    volumes:
      # Host paths are derived from VOXCPM_ASSET_ROOT (.env); container paths are fixed.
      - ${VOXCPM_ASSET_ROOT:-.}/models:/models
      - ${VOXCPM_ASSET_ROOT:-.}/cache/huggingface:/cache/huggingface
      - ${VOXCPM_ASSET_ROOT:-.}/cache/torch:/cache/torch
      - ${VOXCPM_ASSET_ROOT:-.}/data:/data
      - ${VOXCPM_ASSET_ROOT:-.}/outputs:/outputs
      - ${VOXCPM_ASSET_ROOT:-.}/tmp/gradio:/tmp/gradio

    # NVIDIA GPU support. If your Docker environment has no NVIDIA GPU support,
    # set VOXCPM_DEVICE=cpu in .env and remove or comment out this deploy block.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # The container downloads the model on first start before the app comes up,
    # which can take a long time. A generous start_period keeps the container
    # from being reported unhealthy while that first download is in progress.
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8808/\", timeout=5).read()' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 1800s
